# Copy this file to application-local.properties for local development.
# The real application-local.properties must stay untracked and should contain your machine-specific secrets.

# Local Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/blogdb
spring.datasource.username=your_mysql_username
spring.datasource.password=your_mysql_password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JWT Secret for local development
jwt.secret=replace_with_a_secure_random_secret

# CORS allowed origins for local frontend (React)
app.cors.allowed-origins=http://localhost:5173
